<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校准证书查询</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: white; padding: 32px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #1a73e8; margin-bottom: 24px; font-size: 20px; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 12px; }
  button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div class="box">
  <h1>📋 校准证书查询</h1>
  <input id="cid" placeholder="请输入证书编号" />
  <button onclick="location.href='cert.html?id='+document.getElementById('cid').value">查询</button>
</div>
</body>
</html>
